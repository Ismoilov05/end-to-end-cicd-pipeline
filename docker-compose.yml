version: "3.9"

services:
  app:
    build: .
    container_name: fastapi-app

    ports:
      - "8000:8000"

    restart: always

    networks:
      - cicd-network

  jenkins:
    build: 
     context: .
     dockerfile: Dockerfile.jenkins

    container_name: jenkins

    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    restart: always

    networks:
      - cicd-network

volumes:
  jenkins_home:

networks:
  cicd-network: