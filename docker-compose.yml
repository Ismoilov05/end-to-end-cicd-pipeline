version: "3.9"

services:
  app:
    build: .
    container_name: fastapi-app

    ports:
      - "8000:8000"

    restart: always

    networks:
      - cicd-network

  jenkins:
    image: jenkins/jenkins:lts

    container_name: jenkins

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home

    restart: always

    networks:
      - cicd-network

volumes:
  jenkins_home:

networks:
  cicd-network: